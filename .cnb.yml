# cnb.cool pipeline - Pearl(PRL) PoUW miner (kan).
#
# ONE branch line (main) + tag-driven Releases. No feature branches.
#
#   main / push      -> FREE GPU-less runner. CUDA compiles without a GPU and the
#                       solver's reference path runs on CPU, so every commit is fully
#                       built AND correctness-verified at zero GPU cost:
#                         build      -> portable multi-arch fatbin (sm_75..sm_90 SASS + PTX)
#                         cpu-verify -> reference jackpot search -> oracle-shaped PlainProof
#
#   <tag> / tag_push -> build the "download & run" portable package and publish it as a
#                       Release with the tarball attached. Push a semver tag (e.g. v1.2.0)
#                       to cut a release. Tags drive Releases - the only other trigger.

main:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev
        - name: cutlass
          # header-only; without it build.sh silently falls back to tc_block and the
          # production CUTLASS kernel never gets compile-checked on push.
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: toolchain-info
          script:
            - nvcc --version | tail -2
            - g++ --version | head -1
        - name: build
          script: bash build.sh
        - name: cpu-verify
          script: bash cpu_test.sh

# Tag-driven Release. The Release must exist before attachments can upload, so the
# built-in git:release task runs FIRST, then cnbcool/attachments uploads the tarball.
# On tag_push both tasks auto-target the pushed tag (no `tag:` needed).
$:
  tag_push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev patchelf
        - name: cutlass
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: package
          # -> dist/kan-portable-linux-x64.tar.gz (static cudart + bundled libs + multi-arch
          # fatbin). WITH_AB=0 ships a clean miner (no RMW A/B baseline binary).
          script: WITH_AB=0 bash package_portable.sh
        - name: create-release
          # built-in task; title defaults to the tag name, tag auto-taken from tag_push.
          type: git:release
          options:
            description: "Download-&-run portable Pearl(PRL) miner. Static cudart + bundled libs, multi-arch fatbin (sm_75..sm_90 SASS + PTX; Blackwell JITs the PTX at runtime). Only runtime dependency is the NVIDIA driver - no CUDA toolkit, no CUTLASS, no compiler on the target. Unpack and run ./run.sh; see README.txt inside."
            latest: true
        - name: upload-portable-package
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/kan-portable-linux-x64.tar.gz
