# cnb.cool pipeline - Pearl(PRL) PoUW miner (kan).
#
# ONE branch line (main) + tag-driven Releases. No feature branches.
#
#   main / push      -> FREE GPU-less runner. CUDA compiles without a GPU and the
#                       solver's reference path runs on CPU, so every commit is fully
#                       built AND correctness-verified at zero GPU cost:
#                         build      -> portable multi-arch fatbin (sm_75..sm_90 SASS + PTX)
#                         cpu-verify -> reference jackpot search -> oracle-shaped PlainProof
#
#   <tag> / tag_push -> build the "download & run" portable package and publish it as a
#                       Release with the tarball attached. Push an annotated semver tag
#                       (e.g. v1.2.1) to cut a release. The tag message is copied into
#                       RELEASE_NOTES.txt inside the tarball, so every version ships
#                       with its own explanation.

main:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev
        - name: cutlass
          # header-only; without it build.sh silently falls back to tc_block and the
          # production CUTLASS kernel never gets compile-checked on push.
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: toolchain-info
          script:
            - nvcc --version | tail -2
            - g++ --version | head -1
        - name: build
          script: bash build.sh
        - name: cpu-verify
          script: bash cpu_test.sh

# Tag-driven Release. The Release must exist before attachments can upload, so the
# built-in git:release task runs FIRST, then cnbcool/attachments uploads the tarball.
# On tag_push both tasks auto-target the pushed tag (no `tag:` needed).
$:
  tag_push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev patchelf
        - name: cutlass
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: package-generic
          # -> dist/kan-portable-linux-x64.tar.gz stable attachment alias plus a
          # versioned dist/kan-portable-linux-x64-<tag>.tar.gz. Static cudart +
          # bundled libs + multi-arch fatbin. WITH_AB=0 ships a clean miner
          # (no RMW A/B baseline binary).
          script: WITH_AB=0 bash package_portable.sh
        - name: package-sm86-ampere
          # Ampere/RTX 3080Ti/3090 tuned package.  The public generic package is
          # compatibility-first; this package restores the sm_86 production
          # compile knobs used by the historical 100+ TH/s baseline.
          script: WITH_AB=0 ARCH=sm_86 GROUPM=8 KSTAGES=3 PACKAGE_FLAVOR=sm86-g8 bash package_portable.sh
        - name: package-sm86-g4-k3
          # Experimental sm_86 tuning artifact.  VPS testing must download this
          # package from the Release; do NOT compile on the GPU box.
          script: WITH_AB=0 ARCH=sm_86 GROUPM=4 KSTAGES=3 PACKAGE_FLAVOR=sm86-g4-k3 bash package_portable.sh
        - name: package-sm86-g12-k3
          script: WITH_AB=0 ARCH=sm_86 GROUPM=12 KSTAGES=3 PACKAGE_FLAVOR=sm86-g12-k3 bash package_portable.sh
        - name: package-sm86-g16-k3
          script: WITH_AB=0 ARCH=sm_86 GROUPM=16 KSTAGES=3 PACKAGE_FLAVOR=sm86-g16-k3 bash package_portable.sh
        - name: package-sm86-g24-k3
          script: WITH_AB=0 ARCH=sm_86 GROUPM=24 KSTAGES=3 PACKAGE_FLAVOR=sm86-g24-k3 bash package_portable.sh
        - name: package-sm86-g8-k4
          # Pipeline-depth sweep: GROUPM=8 was still best in v1.2.12, so test
          # whether a deeper cp.async pipeline moves sm_86 over 100 TH/s.
          # KSTAGES=2 is intentionally omitted: FoldMmaMultistage requires >=3.
          script: WITH_AB=0 ARCH=sm_86 GROUPM=8 KSTAGES=4 PACKAGE_FLAVOR=sm86-g8-k4 bash package_portable.sh
        - name: package-sm86-g4-k4
          script: WITH_AB=0 ARCH=sm_86 GROUPM=4 KSTAGES=4 PACKAGE_FLAVOR=sm86-g4-k4 bash package_portable.sh
        - name: package-sm86-g12-k4
          script: WITH_AB=0 ARCH=sm_86 GROUPM=12 KSTAGES=4 PACKAGE_FLAVOR=sm86-g12-k4 bash package_portable.sh
        - name: create-release
          # built-in task; title defaults to the tag name, tag auto-taken from tag_push.
          type: git:release
          options:
            description: "Download-&-run portable Pearl(PRL) miner. Static cudart + bundled libs. Assets include the generic multi-arch fatbin, the production sm_86/GROUPM=8 package, and sm_86 GROUPM tuning packages for RTX 3080Ti/3090 measurement. Only runtime dependency is the NVIDIA driver - no CUDA toolkit, no CUTLASS, no compiler on the target. Unpack and run ./run.sh; see README.txt and version-specific RELEASE_NOTES.txt inside."
            latest: true
        - name: upload-portable-package
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/kan-portable-linux-x64.tar.gz
              - dist/kan-portable-linux-x64-sm86-g8.tar.gz
              - dist/kan-portable-linux-x64-sm86-g4-k3.tar.gz
              - dist/kan-portable-linux-x64-sm86-g12-k3.tar.gz
              - dist/kan-portable-linux-x64-sm86-g16-k3.tar.gz
              - dist/kan-portable-linux-x64-sm86-g24-k3.tar.gz
              - dist/kan-portable-linux-x64-sm86-g8-k4.tar.gz
              - dist/kan-portable-linux-x64-sm86-g4-k4.tar.gz
              - dist/kan-portable-linux-x64-sm86-g12-k4.tar.gz
