# cnb.cool pipeline for the Pearl(PRL) self-built PoUW solver.
#
# Two pipelines:
#   main (push) -> FREE GPU-less runner. CUDA still COMPILES with no GPU, and the
#                  solver's reference path runs entirely on CPU, so this fully
#                  builds AND correctness-verifies the solver at zero GPU cost:
#                    build      -> portable multi-arch CUDA fatbin (sm_75..sm_90 SASS + PTX)
#                    cpu-verify -> reference jackpot search -> oracle-shaped PlainProof
#   gpu  (push) -> GPU runner (metered!). Builds natively for the runner's arch and
#                  runs the dp4a kernel smoke test. Deliberately on a SEPARATE branch
#                  so it only spends GPU minutes when you push to `gpu` on purpose.
#
# cnb GPU-runner selection is by tag (confirmed from working cnb.cool repos):
#   cnb:arch:amd64:gpu        -> default, H20  (Hopper, sm_90)  <-- our fatbin already has sm_90 SASS
#   cnb:arch:amd64:gpu:L40    -> L40           (Ada,    sm_89)
#   cnb:arch:amd64:gpu:L20    -> L20 48GB      (Ada,    sm_89)
# NOTE: cnb offers no Blackwell/sm_120 (5090) runner, so cnb GPU validates CORRECTNESS
# on a real GPU (proof is arch-independent); sm_120 perf still needs the 5090 box.
# NOTE: the GPU tag only schedules if GPU is enabled/approved for this repo (the 申请 step).

main:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git ca-certificates
        - name: toolchain-info
          script:
            - nvcc --version | tail -2
            - g++ --version | head -1
            - (command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi) || echo "no GPU on this runner (expected; build is GPU-independent)"
        - name: build
          script: bash build.sh
        - name: cpu-verify
          script: bash cpu_test.sh

gpu:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      runner:
        tags: cnb:arch:amd64:gpu        # H20 (sm_90); change to :gpu:L40 / :gpu:L20 if that's what was granted
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git ca-certificates
        - name: gpu-info
          script: nvidia-smi
        - name: build
          # build.sh auto-detects the runner's GPU (nvidia-smi -> sm_90 on H20) and builds natively
          script: bash build.sh
        - name: cpu-verify
          # cheap CPU sanity gate before spending the GPU smoke run
          script: bash cpu_test.sh
        - name: gpu-smoke
          # dp4a kernel runs on the real GPU: --mine 20 at golden nbits -> win + PlainProof, rc 0
          script: bash run_test.sh

# poolprobe (push to `poolprobe` branch) -> M1c pre-flight. Pure network, no mining.
# Runs on the SAME GPU runner the hunt will use, so it tests the REAL egress path:
# can this runner reach kryptex stratum, authorize our wallet, and pull a job?
# Gates the full ~1.8h/share hunt — cheap (~30s) fail-fast before spending GPU.
poolprobe:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      runner:
        tags: cnb:arch:amd64:gpu        # same tag that scheduled the L40 for the gpu pipeline
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends python3 ca-certificates
        - name: net-info
          script: nvidia-smi -L && python3 --version
        - name: pool-probe
          script: python3 pool_probe.py

# hunt (push to `hunt` branch) -> M1c REAL share hunt on the GPU runner.
# Builds the solver natively (sm_89 on L40), then runs m1c_pool_hunt.py: mine the
# latest kryptex job at share diff 2^20; on a win, submit + wait 30s for the pool's
# verdict (the M1c ground truth), then stop. MAXSEC is large so cnb's OWN job cap is
# the binding limit (lets us measure it); STOP_AFTER_WIN ends early on the first win.
hunt:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      runner:
        tags: cnb:arch:amd64:gpu
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git python3 ca-certificates
        - name: gpu-info
          script: nvidia-smi -L
        - name: build
          script: bash build.sh
        - name: hunt
          script: OMP_NUM_THREADS=16 WORKER=m1ccnb GEN=$PWD/build/plainproof_gen GENDIR=$PWD/build WIN_FILE=/tmp/m1c_win.json MAXSEC=7200 BATCH=1000000 STOP_AFTER_WIN=1 STOP_ON_ACK=1 python3 m1c_pool_hunt.py

# probe2 (push `probe2` branch) -> M1c submit-shape disambiguation. The hunt found a
# real win but the pool was SILENT on the submit. This builds the solver (for a
# well-formed proof) then sends 3 mining.submit variants (real-job / bogus-job_id /
# garbage-proof), with and without mining.subscribe, and reports which the pool ACKs.
# A bogus-job_id "unknown job" ack => our shape is recognized; all-silent => it isn't.
probe2:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      runner:
        tags: cnb:arch:amd64:gpu
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git python3 ca-certificates
        - name: build
          script: bash build.sh
        - name: probe2-nosub
          script: WORKER=probe2n GEN=$PWD/build/plainproof_gen SUBSCRIBE=0 python3 pool_probe2.py
        - name: probe2-sub
          script: WORKER=probe2s GEN=$PWD/build/plainproof_gen SUBSCRIBE=1 python3 pool_probe2.py

# verify (push `verify` branch) -> M1c OFFLINE self-verify. Removes the LAST doubt about
# our side before spending money on lpminer capture. Builds the OFFICIAL Rust verifier
# (zk_pow::api::verify::verify_plain_proof, from vendored pearl-spec) and our solver, then
# checks proofs from BOTH the CPU reference path AND the GPU `--mine` redraw loop the live
# hunt used (whose winning-share assembly has never been officially verified). GPU runner
# is required because `--mine` runs the dp4a CUDA kernel.
#   ALL-VALID  => our proof is officially correct end to end => kryptex reject is THEIR
#                 third-party submit contract, not us => greenlight paid lpminer capture.
#   any INVALID => a real, free-fixable bug on our side, found before spending a cent.
verify:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      runner:
        tags: cnb:arch:amd64:gpu
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends curl gcc g++ make git ca-certificates
        - name: gpu-info
          script: nvidia-smi -L
        - name: self-verify
          script: bash verify_run.sh
