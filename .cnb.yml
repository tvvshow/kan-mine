# cnb.cool pipeline for the Pearl(PRL) self-built PoUW solver.
#
# The default cnb runner has NO GPU (one must be requested explicitly), but CUDA
# code COMPILES without a GPU and the solver's reference path runs entirely on
# CPU. So this pipeline fully builds AND correctness-verifies the solver on the
# free GPU-less runner:
#   build      -> portable multi-arch CUDA fatbin (sm_75..sm_90 SASS + PTX)
#   cpu-verify -> reference jackpot search -> emits an oracle-shaped PlainProof
# The GPU kernel smoke test (run_test.sh, --mine / dp4a) is added in a later
# iteration once a GPU runner is wired up.
main:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git ca-certificates
        - name: toolchain-info
          script:
            - nvcc --version | tail -2
            - g++ --version | head -1
            - (command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi) || echo "no GPU on this runner (expected; build is GPU-independent)"
        - name: build
          script: bash build.sh
        - name: cpu-verify
          script: bash cpu_test.sh
