# cnb.cool pipeline - Pearl(PRL) PoUW miner (kan).
#
# ONE branch line (main) + tag-driven Releases. No feature branches.
#
#   main / push      -> FREE GPU-less runner. CUDA compiles without a GPU and the
#                       solver's reference path runs on CPU, so every commit is fully
#                       built AND correctness-verified at zero GPU cost:
#                         build      -> portable multi-arch fatbin (sm_80..sm_90 SASS + PTX)
#                         cpu-verify -> reference jackpot search -> oracle-shaped PlainProof
#
#   <tag> / tag_push -> build the "download & run" portable packages and publish
#                       them as a Release:
#                         1. generic multi-arch compatibility package
#                         2. sm_86 / GROUPM=8 production tuned package
#                       Push an annotated semver tag (e.g. v1.2.1) to cut a
#                       release. The tag message is copied into RELEASE_NOTES.txt
#                       inside the tarballs, so every version ships with its own
#                       explanation.
#
#   main / web_trigger_gpu_verify
#                    -> ON-DEMAND CNB GPU runner. This is the L2 release gate for
#                       the generic package on the GPU CNB assigns (typically
#                       L40/H20-class shared datacenter GPU):
#                         build with CUTLASS -> run_test.sh -> real-cfg POSTCHECK
#                         -> portable package build -> package POSTCHECK.
#                       It does not replace sm_86 validation unless the runner is
#                       actually sm_86.
#
#   gpu-verify / push
#                    -> Same GPU validation as above, but auto-triggered by:
#                         git push origin HEAD:gpu-verify
#                       This lets release validation consume CNB's free GPU
#                       without relying on a browser click.

main:
  push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev
        - name: cutlass
          # header-only; without it build.sh silently falls back to tc_block and the
          # production CUTLASS kernel never gets compile-checked on push.
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: toolchain-info
          script:
            - nvcc --version | tail -2
            - g++ --version | head -1
        - name: release-profile-check
          script: bash check_release_profiles.sh
        - name: build
          script: bash build.sh
        - name: cpu-verify
          script: bash cpu_test.sh

  web_trigger_gpu_verify:
    - name: cnb-gpu-verify
      runner:
        # CNB public GPU tags (docs, 2026): cnb:arch:amd64:gpu, :L40, :H20.
        # Use the default GPU pool here because this repository can request a
        # GPU directly; the validation script detects the actual compute
        # capability and refuses unsupported sm_70/Volta.
        tags: cnb:arch:amd64:gpu
      docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev patchelf
        - name: cutlass
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: gpu-verify
          script: bash ci_gpu_verify.sh

gpu-verify:
  push:
    - name: cnb-gpu-verify
      runner:
        tags: cnb:arch:amd64:gpu
      docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev patchelf
        - name: cutlass
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: gpu-verify
          script: bash ci_gpu_verify.sh

# Tag-driven Release. The Release must exist before attachments can upload, so the
# built-in git:release task runs FIRST, then cnbcool/attachments uploads the tarball.
# On tag_push both tasks auto-target the pushed tag (no `tag:` needed).
$:
  tag_push:
    - docker:
        image: nvidia/cuda:12.4.1-devel-ubuntu22.04
      stages:
        - name: deps
          script: apt-get update -y && apt-get install -y --no-install-recommends gcc g++ make git curl ca-certificates libssl-dev patchelf
        - name: cutlass
          script: if [ ! -d ~/cutlass ]; then git clone --depth 1 https://github.com/NVIDIA/cutlass -b v3.5.1 ~/cutlass; fi
        - name: release-profile-check
          script: bash check_release_profiles.sh
        - name: package-generic
          # -> dist/kan-portable-linux-x64.tar.gz stable attachment alias plus a
          # versioned dist/kan-portable-linux-x64-<tag>.tar.gz. Static cudart +
          # bundled libs + multi-arch fatbin. WITH_AB=0 ships a clean miner
          # (no RMW A/B baseline binary). This is the compatibility-first
          # package for Ampere/Ada/Hopper plus Blackwell PTX fallback; it does not
          # promise per-architecture optimal performance.
          script: WITH_AB=0 bash package_portable.sh
        - name: package-sm86-ampere
          # Production tuned package for Ampere gaming / sm_86
          # (RTX 3080Ti/3090 class). Keep this as the only sm_86 default release
          # package unless GPU_PROFILES.md is updated with new verified data.
          script: WITH_AB=0 ARCH=sm_86 GROUPM=8 KSTAGES=3 PACKAGE_FLAVOR=sm86-g8 bash package_portable.sh
        - name: package-sm75-turing
          # Turing / sm_75 (RTX 20 series) package. The generic CUTLASS kernel cannot
          # run on Turing (no cp.async; per-block shared memory caps at 64KB while the
          # CUTLASS kernel needs ~89KB), so this flavor forces the WMMA kernel
          # (tc_block.cu, 32KB static shared memory) via KERNEL=wmma. Validated
          # POSTCHECK ok=1 on RTX 2080 Ti. Status: Candidate.
          script: WITH_AB=0 ARCH=sm_75 KERNEL=wmma PACKAGE_FLAVOR=sm75 bash package_portable.sh
        - name: checksums
          script: cp install_kan.sh dist/install_kan.sh && (cd dist && sha256sum kan-portable-linux-x64.tar.gz kan-portable-linux-x64-sm75.tar.gz kan-portable-linux-x64-sm86-g8.tar.gz install_kan.sh > SHA256SUMS)
        - name: create-release
          # built-in task; title defaults to the tag name, tag auto-taken from tag_push.
          type: git:release
          options:
            description: "Download-&-run portable Pearl(PRL) miner. Static cudart + bundled libs. Assets include the generic multi-arch compatibility package, SHA256SUMS, and the production sm_86/GROUPM=8 tuned package for RTX 3080Ti/3090 class GPUs. Pool mode includes run.sh auto-restart plus async share submit so submit_wait does not block the next mining attempt. Optional systemd/logrotate templates are included inside the portable package. Experimental sm_86 GROUPM/KSTAGES sweep packages are intentionally not published as default release assets. Only runtime dependency is the NVIDIA driver - no CUDA toolkit, no CUTLASS, no compiler on the target. Unpack and run ./run.sh; see README.txt, CHANGELOG.md, GPU_PROFILES.md, BUILD_INFO.txt and RELEASE_NOTES.txt inside."
            latest: true
        - name: upload-portable-package
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/kan-portable-linux-x64.tar.gz
              - dist/kan-portable-linux-x64-sm75.tar.gz
              - dist/kan-portable-linux-x64-sm86-g8.tar.gz
              - dist/SHA256SUMS
              - install_kan.sh
